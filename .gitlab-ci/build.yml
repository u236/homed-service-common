.build:
  stage: build
  script:
  - "[[ -n ${COMPILER} ]] && export PATH=\"${PATH}:/opt/gcc/${COMPILER}/bin\""
  - "[[ -n ${COMPILER} ]] && export STAGING_DIR=\"/opt/gcc/${COMPILER}\""
  - "/opt/qt/${QT_BUILD}/bin/qmake ${NAME}.pro \"INCLUDEPATH += /opt/openssl/${OPENSSL_BUILD}/include\" \"LIBS += -L/opt/openssl/${OPENSSL_BUILD}/lib\""
  - "make -j $(nproc)"
  - "cp ${NAME} ${NAME}-${ARCHITECTURE}"
  - "cp ${NAME}-${ARCHITECTURE} /var/www/sandbox.u236.org/${NAME}"
  artifacts:
    paths:
    - "${NAME}-*"
    expire_in: 1 day
  rules:
  - if: $CI_COMMIT_TAG =~ /^\d.\d+.\d+$/ || $CI_COMMIT_TAG == "dev"
    when: always
  - when: never

Build Linux Binary (amd64):
  extends: .build
  variables:
    ARCHITECTURE: linux-amd64
    QT_BUILD: qt-amd64-linux-5.15.4-shared
    OPENSSL_BUILD: openssl-amd64-linux-3.3.2-static
  script:
  - "QT=/opt/qt/${QT_BUILD} OPENSSL=/opt/openssl/${OPENSSL_BUILD} && docker run --rm -u ${UID}:${UID} -v ${QT}:${QT} -v /opt/openssl:/opt/openssl -v ${PWD}/..:/build -w /build/${NAME} gcc:10.5.0 bash -c \"${QT}/bin/qmake ${NAME}.pro \\\"INCLUDEPATH += ${OPENSSL}/include\\\" \\\"LIBS += -L${OPENSSL}/lib\\\"; make -j $(nproc)\""
  - "cp ${NAME} ${NAME}-${ARCHITECTURE}"
  - "cp ${NAME}-${ARCHITECTURE} /var/www/sandbox.u236.org/${NAME}"

Build Linux Binary (aarch64):
  extends: .build
  variables:
    ARCHITECTURE: linux-aarch64
    QT_BUILD: qt-aarch64-linux-gnu-5.15.4-shared
    OPENSSL_BUILD: openssl-aarch64-linux-gnu-3.3.2-static
    COMPILER: gcc-aarch64-none-linux-gnu-10.2.0
  after_script:
  - "cp ${NAME}-linux-aarch64 ${NAME}-linux-arm64"

